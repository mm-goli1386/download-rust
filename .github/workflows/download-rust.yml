name: Upload to Release
on:
  workflow_dispatch:

jobs:
  upload-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download file
        run: curl -L -o rust-1.95.0.tar.xz https://static.rust-lang.org/dist/rust-1.95.0-x86_64-unknown-linux-gnu.tar.xz

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v1
        with:
          tag_name: rust-1.95.0
          name: "Rust 1.95.0 Tarball"
          files: rust-1.95.0.tar.xz
          token: ${{ secrets.GITHUB_TOKEN }}
