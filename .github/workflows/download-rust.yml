name: Build and Vendor Dependencies

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Create project and vendor
        run: |
          mkdir -p matrix-client
          cd matrix-client
          cargo init --lib
          cat > Cargo.toml << 'EOF'
[package]
name = "matrix-client"
version = "0.1.0"
edition = "2021"

[dependencies]
matrix-sdk = "0.9"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
anyhow = "1"
thiserror = "1"
url = "2"
EOF
          
          cargo vendor vendor
          tar -czf vendor.tar.gz vendor/
          rm -rf vendor

      - name: Commit and push vendor file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add matrix-client/vendor.tar.gz
          git commit -m "Add vendored dependencies" || echo "No changes to commit"
          git push
