name: Build and Vendor Dependencies

on:
  workflow_dispatch:  # اجرای دستی

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable

      - name: Create project
        run: |
          mkdir -p matrix-client
          cd matrix-client
          cargo init --lib
          echo 'matrix-sdk = "0.9"' >> Cargo.toml
          echo 'tokio = { version = "1", features = ["full"] }' >> Cargo.toml
          echo 'serde = { version = "1", features = ["derive"] }' >> Cargo.toml
          echo 'anyhow = "1"' >> Cargo.toml

      - name: Vendor dependencies
        run: |
          cd matrix-client
          cargo vendor vendor
          tar -czf vendor.tar.gz vendor/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: matrix-deps
          path: matrix-client/vendor.tar.gz
