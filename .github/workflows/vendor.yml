name: Build and Vendor

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Create project and vendor
        run: |
          mkdir -p matrix-client
          cd matrix-client
          cargo init --lib
          cat > Cargo.toml << 'EOF'
[package]
name = "matrix-client"
version = "0.1.0"
edition = "2021"

[dependencies]
matrix-sdk = { version = "0.9", features = ["native-tls"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
anyhow = "1"
thiserror = "1"
url = "2"
EOF
          cargo vendor vendor
          tar -czf vendor.tar.gz vendor/
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add matrix-client/vendor.tar.gz
          git diff --staged --quiet || git commit -m "Add vendor.tar.gz"
          git push
