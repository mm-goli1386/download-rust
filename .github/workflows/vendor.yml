name: Vendor Robrix

on:
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: project-robius/robrix
          path: robrix
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Vendor everything
        working-directory: robrix
        run: cargo vendor vendor
      - name: Compress vendor directory
        working-directory: robrix
        run: tar -czf vendor.tar.gz vendor
      - uses: actions/upload-artifact@v4
        with:
          name: robrix-vendor
          path: robrix/vendor.tar.gz
