name: Vendor Robrix Dependencies

on:
  workflow_dispatch:

jobs:
  vendor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Clone Robrix
        run: git clone https://github.com/project-robius/robrix.git
      
      - name: Vendor dependencies
        working-directory: robrix
        run: |
          cargo vendor vendor
          tar -czf vendor.tar.gz vendor/
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: robrix-vendor
          path: robrix/vendor.tar.gz
