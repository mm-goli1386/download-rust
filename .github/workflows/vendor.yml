name: Build and Vendor

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Create Cargo.toml
        run: |
          mkdir -p matrix-client
          cd matrix-client
          cargo init --lib
          echo '[package]' > Cargo.toml
          echo 'name = "matrix-client"' >> Cargo.toml
          echo 'version = "0.1.0"' >> Cargo.toml
          echo 'edition = "2021"' >> Cargo.toml
          echo '' >> Cargo.toml
          echo '[dependencies]' >> Cargo.toml
          echo 'matrix-sdk = "0.10"' >> Cargo.toml
          echo 'tokio = { version = "1", features = ["full"] }' >> Cargo.toml
          echo 'serde = { version = "1", features = ["derive"] }' >> Cargo.toml
          echo 'anyhow = "1"' >> Cargo.toml
          echo 'thiserror = "1"' >> Cargo.toml
          echo 'url = "2"' >> Cargo.toml
      
      - name: Vendor dependencies
        run: |
          cd matrix-client
          cargo vendor vendor
          tar -czf vendor.tar.gz vendor/
      
      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add matrix-client/vendor.tar.gz
          git diff --staged --quiet || git commit -m "Add vendor.tar.gz"
          git push
